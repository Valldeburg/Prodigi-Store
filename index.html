// ══════════════════════════════════════════
//  FETCH GOOGLE SHEETS (langsung, tanpa proxy)
//  Bekerja saat di-hosting di GitHub Pages / Vercel
// ══════════════════════════════════════════
function parseGviz(raw){
  try{
    const s=raw.indexOf("{"), e=raw.lastIndexOf("}");
    if(s<0||e<0) return [];
    const d=JSON.parse(raw.slice(s,e+1));
    if(!d.table?.rows?.length) return [];
    const cols=d.table.cols.map((c,i)=>({label:(c.label||c.id||"c"+i).trim(),i}));
    return d.table.rows.filter(r=>r?.c).map(row=>{
      const o={};
      cols.forEach(c=>{const v=row.c[c.i]; o[c.label]=String(v?.f??v?.v??"").trim();});
      return o;
    }).filter(r=>Object.values(r).some(v=>v!==""));
  }catch(e){ return []; }
}

async function fetchSheet(name){
  const url=`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(name)}`;
  try{
    const res=await fetch(url);
    if(!res.ok) throw new Error("HTTP "+res.status);
    const text=await res.text();
    const rows=parseGviz(text);
    console.log(`[${name}] ${rows.length} rows`, rows[0]?Object.keys(rows[0]):[]);
    return rows;
  }catch(e){
    console.error(`[${name}] Error:`, e.message);
    return [];
  }
}

function gc(row,...keys){ for(const k of keys){ const v=row[k]; if(v&&String(v).trim()!="") return String(v).trim(); } return ""; }
const gNama =(r)=>gc(r,"Nama","nama","NAMA","Name","name","Group","Produk","produk");
const gKet  =(r)=>gc(r,"Keterangan","keterangan","KETERANGAN","Ket","ket","Desc","desc","Paket","Item");
// "Harga Jual" harus LEBIH DULU dari "Harga" supaya harga jual yang tampil, bukan harga modal
const gHarga=(r)=>gc(r,"Harga Jual","HargaJual","Nominal_Harga_Jual","Nominal Harga Jual","Harga","harga","HARGA","Price","Jual");
const gKode =(r)=>gc(r,"kode","Kode","KODE","Code","code","KD","ID","kd");

function fmtRp(v){ const n=parseInt(String(v||"").replace(/[^\d]/g,""),10); return isNaN(n)?String(v||""):"Rp "+n.toLocaleString("id-ID"); }
function hargaNum(p){ const n=parseInt(String(gHarga(p)||"").replace(/[^\d]/g,""),10); return isNaN(n)?gHarga(p):n.toLocaleString("id-ID"); }

function loadCache(){ try{ return JSON.parse(localStorage.getItem(CACHE_KEY)||"{}"); }catch{ return {}; } }
function saveCache(d){ try{ localStorage.setItem(CACHE_KEY,JSON.stringify(d)); }catch{} }
function loadDark(){ try{ return localStorage.getItem(DARK_KEY)==="1"; }catch{ return false; } }
function saveDark(v){ try{ localStorage.setItem(DARK_KEY,v?"1":"0"); }catch{} }

}

    setLoadP(true); const all=[];

      setStatus("Memuat "+s+"…");
      const rows=await fetchSheet(s);
      all.push(...rows.filter(r=>gNama(r)));
    }
    setPaket(all); setStatus(""); setLoadP(false);
  }
  async function loadGame(){
    setLoadG(true); setStatus("Memuat GameData…");
    const rows=await fetchSheet(GAME_SHEET);
    setGame(rows.filter(r=>gNama(r)));
    setStatus(""); setLoadG(false);
  }
  function refresh(){
    if(tab==="paket"){ setPaket([]); loadPaket(); }
    if(tab==="game") { setGame([]);  loadGame();  }
  }

  const curRows=tab==="paket"?paketRows:tab==="game"?gameRows:[];
  const loading=tab==="paket"?loadP:tab==="game"?loadG:false;

    if(!curRows.length) return [];
    const map=new Map();
    curRows.forEach(r=>{ const n=gNama(r)||"Lainnya"; if(!map.has(n)) map.set(n,[]); map.get(n).push(r); });

    return arr;

    if(!product) return;
    const isGame=tab==="game";
    if(isGame&&!form.id){ setErr("No./ID Tujuan wajib diisi"); return; }
    if(!isGame&&!form.nomor){ setErr("Nomor tujuan wajib diisi"); return; }
    if(!form.bayar){ setErr("Pilih metode pembayaran"); return; }

    const nc={...cache,[gn]:form}; setCache(nc); saveCache(nc);
    const url=isGame?buildGameURL(product,form.id,form.bayar):buildPaketURL(product,form.nomor,form.bayar);

      React.createElement("button",{onClick:()=>setDark(d=>!d),style:{background:"none",border:"none",cursor:"pointer",padding:4,display:"flex",borderRadius:20}},

          )
        :(tab!=="paket"&&tab!=="game")
          ?React.createElement("div",{style:{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"60vh",gap:14,padding:40}},
              React.createElement("div",{style:{fontSize:48,opacity:.3}},"🚧"),
              React.createElement("div",{style:{fontSize:15,fontWeight:500,color:txt}},"Segera Hadir"),
              React.createElement("div",{style:{fontSize:13,color:txt2,textAlign:"center"}},"Tab ini sedang dalam pengembangan")
            )
          :!group
            ?React.createElement("div",null,
                React.createElement("div",{style:{padding:"10px 16px",borderBottom:`1px solid ${brd}`,background:bg2}},
                  React.createElement("span",{style:{fontSize:12,fontWeight:600,color:txt2,letterSpacing:.6}},tab==="game"?"GAME":"OPERATOR")
                ),
                curRows.length===0&&!loading
                  ?React.createElement("div",{style:{padding:40,textAlign:"center",color:txt2}},
                      React.createElement("div",{style:{fontSize:36,marginBottom:12,opacity:.4}},"📭"),
                      React.createElement("div",{style:{fontWeight:500,fontSize:15,color:txt,marginBottom:4}},"Tidak ada data"),
                      React.createElement("div",{style:{fontSize:12,marginBottom:16}},tab==="paket"||tab==="game"?"Pastikan spreadsheet sudah dipublikasikan":""),
                      React.createElement("button",{onClick:refresh,style:{padding:"8px 20px",background:BLU,color:"#fff",border:"none",borderRadius:8,cursor:"pointer",fontSize:13}},"\u21BB Coba Lagi")
                    )
                  :React.createElement("div",null,
                      groups.map(({name,count})=>
                        React.createElement("button",{key:name,onClick:()=>setGroup(name),style:{width:"100%",display:"flex",alignItems:"center",padding:"14px 16px",background:bg,border:"none",borderBottom:`1px solid ${brd}`,cursor:"pointer"}},
                          React.createElement("span",{style:{flex:1,fontSize:15,color:txt,textAlign:"left"}},name),
                          React.createElement("span",{style:{background:D?"#334155":"#e5e7eb",color:D?"#94a3b8":"#374151",borderRadius:6,padding:"2px 8px",fontSize:12,fontWeight:500,marginRight:8}},count),
                          React.createElement(Ico,{n:"chev",sz:18,c:txt2})
                        )
                      )
                    )
              )
            :React.createElement("div",null,
                subItems.length===0
                  ?React.createElement("div",{style:{padding:40,textAlign:"center",color:txt2}},"Tidak ada produk")
                  :subItems.map((p,i)=>{
                      const ket=gKet(p)||gKode(p)||"-";
                      const hrg=gHarga(p);
                      const hn=parseInt(String(hrg).replace(/[^\d]/g,""),10);
                      const kode=gKode(p);
                      return React.createElement("div",{key:i,style:{padding:"12px 16px",borderBottom:`1px solid ${brd}`,display:"flex",alignItems:"center",gap:12,background:bg}},
                        React.createElement("div",{style:{flex:1,minWidth:0}},
                          React.createElement("div",{style:{fontSize:14,fontWeight:500,color:txt,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}},ket),
                          gKet(p)&&kode&&React.createElement("div",{style:{fontSize:11,color:txt2,marginTop:2}},kode),
                          React.createElement("div",{style:{fontSize:13,color:GRN,fontWeight:500,marginTop:3}},isNaN(hn)?(hrg||"-"):"Rp "+hn.toLocaleString("id-ID"))
                        ),
                        React.createElement("button",{onClick:()=>openForm(p),style:{background:BLU,color:"#fff",border:"none",borderRadius:8,padding:"7px 14px",fontSize:13,fontWeight:500,cursor:"pointer",whiteSpace:"nowrap",flexShrink:0}},"Beli")
                      );
                    })
              )
    ),

    /* FORM MODAL */
    product&&React.createElement("div",{style:{position:"fixed",inset:0,background:"rgba(0,0,0,.55)",display:"flex",flexDirection:"column",justifyContent:"flex-end",zIndex:200}},
      React.createElement("div",{style:{background:bg,borderRadius:"16px 16px 0 0",padding:"20px 16px 32px",maxHeight:"92vh",overflowY:"auto",maxWidth:430,width:"100%",margin:"0 auto"}},
        React.createElement("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:16}},
          React.createElement("div",{style:{flex:1,paddingRight:8}},
            React.createElement("div",{style:{fontWeight:500,fontSize:15,color:txt,lineHeight:1.4}},gKet(product)||gNama(product)),
            React.createElement("div",{style:{fontSize:12,color:txt2,marginTop:2}},"Kode: "+gKode(product)),
            React.createElement("div",{style:{color:GRN,fontWeight:600,fontSize:16,marginTop:4}},fmtRp(gHarga(product)))
          ),
          React.createElement("button",{onClick:closeForm,style:{background:bg3,border:"none",borderRadius:"50%",width:30,height:30,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}},
            React.createElement(Ico,{n:"close",sz:14,c:txt2})
          )
        ),
        React.createElement("div",{style:{height:1,background:brd,marginBottom:16}}),
        tab==="game"
          ?React.createElement("div",{style:{marginBottom:14}},
              React.createElement("label",{style:{display:"block",fontSize:13,fontWeight:500,color:txt2,marginBottom:6}},"No./ID Tujuan *"),
              React.createElement("input",{value:form.id||"",onChange:e=>{setForm({...form,id:e.target.value});setErr("");},placeholder:"Masukkan ID game",style:{...inp}})
            )
          :React.createElement("div",{style:{marginBottom:14}},
              React.createElement("label",{style:{display:"block",fontSize:13,fontWeight:500,color:txt2,marginBottom:6}},"Nomor Tujuan *"),
              React.createElement("input",{value:form.nomor||"",onChange:e=>{setForm({...form,nomor:e.target.value});setErr("");},placeholder:"08xxxxxxxxxx",type:"tel",style:{...inp}})
            ),
        React.createElement("label",{style:{display:"block",fontSize:13,fontWeight:500,color:txt2,marginBottom:8}},"Metode Pembayaran *"),
        React.createElement("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:16}},
          PAYS.map(m=>React.createElement("button",{key:m,onClick:()=>{setForm({...form,bayar:m});setErr("");},style:{padding:"10px 8px",borderRadius:8,border:form.bayar===m?`2px solid ${BLU}`:`1px solid ${brd}`,background:form.bayar===m?(D?"#1d3a6b":"#eff6ff"):(D?"#1e293b":"#f8fafc"),color:form.bayar===m?(D?"#93c5fd":BLU):txt,fontWeight:form.bayar===m?600:400,cursor:"pointer",fontSize:13,transition:"all .15s"}},m))
        ),
        err&&React.createElement("div",{style:{background:D?"#450a0a":"#fef2f2",border:`1px solid ${D?"#7f1d1d":"#fecaca"}`,borderRadius:8,padding:"8px 12px",marginBottom:12,fontSize:13,color:D?"#fca5a5":"#dc2626"}},err),
        React.createElement("button",{onClick:handleOrder,style:{width:"100%",background:"#25d366",color:"#fff",border:"none",borderRadius:10,padding:13,fontSize:15,fontWeight:600,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:8}},
          React.createElement(Ico,{n:"wa",sz:18,c:"#fff"}), "Pesan via WhatsApp"
        )
      )
    ),

    /* BOTTOM NAV */
    React.createElement("div",{style:{display:"flex",borderTop:`1px solid ${brd}`,background:bg,position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:430,zIndex:100}},
      TABS.map(t=>{
        const a=t.id===tab;
        return React.createElement("button",{key:t.id,onClick:()=>switchTab(t.id),style:{flex:1,padding:"8px 2px 10px",border:"none",cursor:"pointer",background:a?BLU:"transparent",display:"flex",flexDirection:"column",alignItems:"center",gap:3,borderRadius:0,transition:"background .15s"}},
          React.createElement(Ico,{n:t.sym,sz:20,c:a?"#fff":(D?"#94a3b8":"#64748b")}),
          React.createElement("span",{style:{fontSize:9,lineHeight:1.2,textAlign:"center",whiteSpace:"pre-line",color:a?"#fff":(D?"#94a3b8":"#64748b"),fontWeight:a?600:400}},t.label)
        );
      })
    )
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
