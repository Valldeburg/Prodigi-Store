/* ── fetch gviz ── */
function parseGviz(raw) {
  try {
    const s = raw.indexOf("{"), e = raw.lastIndexOf("}");
    if (s<0||e<0) return { cols:[], rows:[] };
    const d = JSON.parse(raw.slice(s, e+1));
    if (!d.table?.rows) return { cols:[], rows:[] };
    const cols = d.table.cols.map((c,i)=>({ id: c.label || c.id || `col${i}`, idx:i }));
    const rows = d.table.rows.filter(r=>r?.c).map(row => {
      const obj = {};
      cols.forEach(c => {
        obj[c.id] = row.c[c.idx]?.f ?? row.c[c.idx]?.v ?? "";
      });
      return obj;
    });
    return { cols, rows };
  } catch(e) { console.warn("gviz parse error:", e); return { cols:[], rows:[] }; }
}

async function fetchSheet(name) {
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(name)}&headers=1`;
  try {
    const res = await fetch(url, { cache:"no-store" });
    if (!res.ok) { console.warn("HTTP error", res.status, name); return []; }
    const text = await res.text();
    const { cols, rows } = parseGviz(text);
    if (rows.length === 0) { console.warn("No rows in", name, "cols:", cols.map(c=>c.id)); }
    else console.log("Sheet", name, "→", rows.length, "rows, cols:", cols.map(c=>c.id));
    return rows;
  } catch(e) { console.warn("Fetch error", name, e.message); return []; }
}

/* ── flexible column getters ── */
function anyCol(row, ...keys) {
  for (const k of keys) {
    const v = row[k];
    if (v !== undefined && v !== null && v !== "") return String(v).trim();
  }
  return "";
}

function detectNama(row) {
  return anyCol(row,"Nama","nama","NAMA","Name","name","Group","group","Produk","produk");
}
function detectKet(row) {
  return anyCol(row,"Keterangan","keterangan","KETERANGAN","Description","desc","Paket","paket","Item");
}
function detectHarga(row) {
return anyCol(row,"Harga Jual","HargaJual","Nominal_Harga_Jual","Harga","harga",);
}
function detectKode(row) {
  return anyCol(row,"kode","Kode","KODE","Kd","KD","Code","code","ID","id");
}

function fmtRp(val) {
  if (!val && val !== 0) return "";
  const n = parseInt(String(val).replace(/[^\d]/g,""),10);
  return isNaN(n) ? String(val) : "Rp " + n.toLocaleString("id-ID");
}
